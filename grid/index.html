<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
    <style>
        .container{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            /* grid-template-rows: 1fr 2fr 1fr; */
            grid-auto-rows: minmax(200px ,auto);
            grid-gap:10px;

        }
        .box{background: skyblue;}
        .box:nth-child(2n){background: pink;}

        .box:nth-child(1){
            grid-column: 1/4;
        }
        .box:nth-child(5){
            grid-row: 2/5;
        }
        .box:nth-child(9){
            grid-column: 1/4;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
    
</body>
</html>
